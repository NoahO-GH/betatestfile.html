<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SECURITY BREACH</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        #hacker-screen {
            width: 80%;
        }

        .glitch-title {
            font-size: 5rem;
            color: #ff0000;
            text-shadow: 2px 2px #550000;
            animation: glitch 0.2s infinite;
            cursor: pointer;
            margin-bottom: 20px;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0); }
        }

        #timer {
            font-size: 4rem;
            color: #ff0000;
            border: 3px solid #ff0000;
            padding: 20px;
            margin: 20px;
            background: rgba(255, 0, 0, 0.1);
        }

        .warning {
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
        }

        a {
            text-decoration: none;
            color: inherit;
        }
    </style>
</head>
<body>

<div id="hacker-screen">
    <div style="color: #fff; letter-spacing: 10px; margin-bottom: 10px;">ENCRYPTION ACTIVE</div>
    
    <!-- CHANGE THE URL BELOW -->
    <a href="https://your-link-here.com" id="hack-link">
        <h1 class="glitch-title">SYSTEM HACKED</h1>
    </a>

    <div id="timer">15:00</div>

    <div class="warning">
        <p>Your files have been encrypted using AES-256. Attempting to restart or close this window will result in <strong>PERMANENT DATA LOSS</strong>.</p>
    </div>
</div>

<script>
    // 15-Minute Countdown Timer
    let time = 900;
    const timerElement = document.getElementById('timer');

    setInterval(() => {
        let minutes = Math.floor(time / 60);
        let seconds = time % 60;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        timerElement.innerHTML = `${minutes}:${seconds}`;
        if (time > 0) time--;
    }, 1000);

    // Instant Full-Screen on Click
    document.getElementById('hack-link').addEventListener('click', function(e) {
        var elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen();
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen();
        } else if (elem.msRequestFullscreen) {
            elem.msRequestFullscreen();
        }
    });
</script>

</body>
</html>
