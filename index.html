<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background: black;
        color: #00ff00; /* GREEN TERMINAL TEXT */
        font-family: 'Consolas', 'Courier New', monospace;
        margin: 0;
        padding: 25px;
        font-size: 20px;
        line-height: 1.5;
        overflow: hidden;
        text-transform: uppercase;
    }
    #terminal { white-space: pre-wrap; display: inline; }
    .cursor {
        display: inline-block;
        width: 12px;
        height: 24px;
        background: #00ff00;
        margin-left: 5px;
        animation: blink 1s infinite;
        vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .btn-box {
        display: flex;
        gap: 30px;
        margin-top: 30px;
    }
    button {
        background: black;
        border: 1px solid #00ff00;
        color: #00ff00;
        padding: 12px 24px;
        font-family: inherit;
        cursor: pointer;
        font-size: 18px;
        text-transform: uppercase;
    }
    button:hover { background: #00ff00; color: black; }

    #bsod {
        display: none;
        background: #0078d7;
        color: white;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        padding: 10%;
        font-family: 'Segoe UI', sans-serif;
        z-index: 10000;
    }
    #rebootMsg {
        display: none;
        background: #7a0000;
        color: white;
        font-family: 'Courier New', monospace;
        padding: 40px;
        border: 5px solid red;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10001;
        text-align: center;
        box-shadow: 0 0 100px red;
    }
    #camDot {
        display: none;
        position: fixed;
        top: 15px;
        left: 15px;
        width: 12px;
        height: 12px;
        background: red;
        border-radius: 50%;
        box-shadow: 0 0 15px red;
        z-index: 10002;
        animation: blink 0.8s infinite;
    }

    /* FULL GLITCH EFFECTS */
    .glitch-strong {
        filter: contrast(1.7) saturate(1.5) hue-rotate(-5deg);
        transform: translateX(-3px) skewX(1deg);
    }
    .glitch-offset {
        text-shadow:
            -2px 0 rgba(0,255,0,0.7),
            2px 0 rgba(0,180,0,0.7);
    }
    .glitch-jitter {
        transform: translateX(-2px) translateY(1px);
    }
    .glitch-tear {
        position: relative;
    }
    .glitch-tear::after {
        content: attr(data-glitch);
        position: absolute;
        left: -2px;
        top: 1px;
        width: 100%;
        color: #00ff00;
        clip-path: polygon(0 0, 100% 0, 100% 40%, 0 60%);
        transform: translateX(3px);
        opacity: 0.7;
        mix-blend-mode: screen;
    }
    .scanline-overlay::before {
        content: "";
        pointer-events: none;
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: repeating-linear-gradient(
            to bottom,
            rgba(0,255,0,0.03) 0px,
            rgba(0,255,0,0.03) 1px,
            transparent 2px,
            transparent 3px
        );
        mix-blend-mode: screen;
        z-index: 9999;
    }
    .flash {
        animation: flashScreen 0.12s linear;
    }
    @keyframes flashScreen {
        0% { background-color: #00ff00; }
        100% { background-color: #000000; }
    }

    #bootMsg {
        color: #00ff00;
        text-align: center;
        margin-top: 25vh; /* pulled a bit further up */
    }
</style>
</head>
<body>

<div id="bootMsg">INITIALIZING SYSTEM...</div>

<div id="camDot"></div>
<div id="terminal"></div><span class="cursor" id="cursor"></span>

<div class="btn-box" id="btnBox" style="display:none;">
    <button id="btn1"></button>
    <button id="btn2"></button>
</div>

<div id="bsod">
    <div style="font-size: 120px;">:(</div>
    <p style="font-size: 36px;">YOUR PC RAN INTO A PROBLEM AND NEEDS TO RESTART.</p>
    <p style="font-size: 24px;"><span id="percent">0</span>% COMPLETE</p>
</div>

<div id="rebootMsg">
    <p>[!] SYSTEM_CRITICAL_FAILURE</p>
    <p>> ERROR_CODE: 0xREBOOT_BYPASS_INITIATED</p>
    <p>> STATUS: REBOOTING_SYSTEM_NOW...</p>
</div>

<script>
const output = document.getElementById('terminal');
const btnBox = document.getElementById('btnBox');
const btn1 = document.getElementById('btn1');
const btn2 = document.getElementById('btn2');
const bsod = document.getElementById('bsod');
const percentTxt = document.getElementById('percent');
const rebootMsg = document.getElementById('rebootMsg');
const camDot = document.getElementById('camDot');

let choiceStage = 'consent';

function beep(freq = 800, duration = 0.1) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
}

function multiBeep() {
    beep(800, 0.1);
    setTimeout(() => beep(900, 0.1), 150);
    setTimeout(() => beep(1000, 0.1), 300);
}

function sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
}

async function typeWriter(text, speed = 45) {
    for (let i = 0; i < text.length; i++) {
        output.innerHTML += text.charAt(i).toUpperCase();
        window.scrollTo(0, document.body.scrollHeight);
        await sleep(speed);
    }
}

/* FULL GLITCH SYSTEM */
function doGlitchOnce() {
    const body = document.body;
    const terminal = document.getElementById('terminal');

    const useStrong = Math.random() < 0.7;
    const useOffset = Math.random() < 0.7;
    const useJitter = Math.random() < 0.6;
    const useScanline = Math.random() < 0.5;
    const useTear = Math.random() < 0.5;
    const useFlash = Math.random() < 0.25;

    if (useStrong) body.classList.add('glitch-strong');
    if (useOffset) terminal.classList.add('glitch-offset');
    if (useJitter) terminal.classList.add('glitch-jitter');
    if (useScanline) body.classList.add('scanline-overlay');

    if (useTear) {
        terminal.classList.add('glitch-tear');
        terminal.setAttribute('data-glitch', terminal.innerText.slice(-200) || terminal.innerText);
    }

    if (useFlash) {
        body.classList.add('flash');
    }

    setTimeout(() => {
        body.classList.remove('glitch-strong', 'scanline-overlay', 'flash');
        terminal.classList.remove('glitch-offset', 'glitch-jitter', 'glitch-tear');
    }, 120 + Math.random() * 260);
}

function startGlitchLoop() {
    const loop = () => {
        if (Math.random() < 0.8) {
            doGlitchOnce();
        }
        const next = 400 + Math.random() * 1600;
        setTimeout(loop, next);
    };
    loop();
}

/* MAIN SEQUENCE */
async function startSequence() {
    const boot = document.getElementById("bootMsg");
    if (boot) boot.style.display = "none";

    startGlitchLoop();

    await typeWriter("MICROSOFT WINDOWS [VERSION 10.0.22631.3447]\n(C) MICROSOFT CORPORATION. ALL RIGHTS RESERVED.\n\n", 55);
    await typeWriter("C:\\USERS\\ADMIN> INIT_DATA_HARVEST.EXE --TARGET=SYSTEM_ROOT --FORCE\n", 45);
    await sleep(150);
    await typeWriter("> DETECTING NETWORK INTERFACE... ", 45);
    await sleep(300);
    await typeWriter("SUCCESS.\n", 60);
    await typeWriter(`> REMOTE_IP_LOGGED: ${Math.floor(Math.random()*255)}.168.1.${Math.floor(Math.random()*255)}\n`, 45);
    await typeWriter("> BYPASSING WINDOWS DEFENDER... [||||||||||] 100%\n", 40);
    await typeWriter("> FIREWALL STATUS: DISABLED.\n", 45);
    await sleep(300);
    await typeWriter("> DO YOU CONSENT TO DATA EXTRACTION? (Y/N): ", 50);

    showConsentButtons();
}

function showConsentButtons() {
    choiceStage = 'consent';
    btn1.textContent = "[ YES ]";
    btn2.textContent = "[ NO ]";
    btn1.onclick = () => handleChoice('yes');
    btn2.onclick = () => handleChoice('no');
    btnBox.style.display = 'flex';
}

function showStealthButtons() {
    choiceStage = 'stealth';
    btn1.textContent = "[ ENABLE STEALTH ]";
    btn2.textContent = "[ DISABLE STEALTH ]";
    btn1.onclick = () => handleStealth('enable');
    btn2.onclick = () => handleStealth('disable');
    btnBox.style.display = 'flex';
}

async function handleChoice(choice) {
    multiBeep();
    btnBox.style.display = 'none';

    if (choiceStage === 'consent') {
        output.innerHTML += (choice === 'yes' ? "Y" : "N") + "\n";

        if (choice === 'yes') {
            await typeWriter("> THANK YOU FOR YOUR COOPERATION.\n", 45);
            await typeWriter("> DATA BEING \"BORROWED\" IN PROGRESS...\n", 45);
            await sleep(450);
            await typeWriter("> SCANNING DIRECTORY: C:/USERS/DOCUMENTS/PRIVATE/\n", 55);
            await typeWriter("> [STEALING]: BANK_INFO_EXPORT.XLSX ... DONE\n", 35);
            await typeWriter("> [STEALING]: SAVED_PASSWORDS_BROWSER ... DONE\n", 35);
            await typeWriter("> [SYSTEM]: ACCESSING INTEGRATED WEBCAM... SUCCESS.\n", 45);
            camDot.style.display = 'block';
            await typeWriter("> RECORDING SESSION START... UPLOADING TO REMOTE CLOUD...\n", 45);
            await sleep(600);
            await typeWriter("> OPTIONAL: ENABLE STEALTH MODE TO HIDE ACTIVITY FROM USER.\n", 45);
            await typeWriter("> CHOOSE STEALTH MODE CONFIGURATION:\n", 45);
            await typeWriter("  [1] ENABLE STEALTH\n  [2] DISABLE STEALTH\n\n", 40);
            showStealthButtons();
        } else {
            await typeWriter("> ACCESS DENIED BY USER.\n", 40);
            await typeWriter("> FINE.\n", 40);
            await typeWriter("> BYPASSING PERMISSIONS... OVERRIDE SUCCESSFUL.\n", 35);
            await typeWriter("> TERMINATING SESSION TO PREVENT LOGGING...\n", 35);
            await typeWriter("> CRITICAL_KERNEL_ERROR_DETONATED.", 35);
            setTimeout(triggerBSOD, 900);
        }
    }
}

async function handleStealth(mode) {
    multiBeep();
    btnBox.style.display = 'none';

    if (mode === 'enable') {
        output.innerHTML += "1\n";
        await typeWriter("> STEALTH MODE: ENABLED.\n", 45);
        await typeWriter("> HIDING PROCESS FROM TASK MANAGER... SUCCESS.\n", 45);
        await typeWriter("> SPOOFING LEGITIMATE PROCESS NAME: SVCHOST.EXE\n", 45);
    } else {
        output.innerHTML += "2\n";
        await typeWriter("> STEALTH MODE: DISABLED.\n", 45);
        await typeWriter("> USER MAY NOTICE ANOMALOUS ACTIVITY.\n", 45);
    }

    await sleep(550);
    await typeWriter("> SIMULATING VIRAL PROPAGATION ACROSS SYSTEM DIRECTORIES...\n", 45);
    await virusSpreadAnimation();
    await typeWriter("> ALL DATA SUCCESSFULLY RELOCATED. BYE.\n", 45);
    setTimeout(fillScreenWithErrors, 1500);
}

async function virusSpreadAnimation() {
    const dirs = [
        "C:/WINDOWS/SYSTEM32/",
        "C:/USERS/ADMIN/APPDATA/LOCAL/",
        "C:/PROGRAM FILES/",
        "C:/USERS/ADMIN/DESKTOP/",
        "C:/USERS/ADMIN/DOCUMENTS/"
    ];
    for (let d of dirs) {
        await typeWriter(`> INFECTING: ${d}\n`, 40);
        let progress = 0;
        while (progress < 100) {
            progress += 10 + Math.random() * 18;
            if (progress > 100) progress = 100;
            const barLen = Math.floor(progress / 5);
            const bar = "█".repeat(barLen) + "░".repeat(20 - barLen);
            output.innerHTML += `  [${bar}] ${progress.toFixed(0)}%\n`;
            await sleep(160 + Math.random() * 220);
        }
        await sleep(260);
    }
}

/* BSOD + ERROR FILL */
function triggerBSOD() {
    bsod.style.display = 'block';
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    let p = 0;
    let iv = setInterval(() => {
        p += Math.random() * 4;
        if (p >= 99.99) {
            p = 99.99;
            clearInterval(iv);
            setTimeout(() => {
                rebootMsg.style.display = 'block';
                setTimeout(() => location.reload(), 4500);
            }, 1200);
        }
        percentTxt.innerText = p.toFixed(2);
    }, 150);
}

function fillScreenWithErrors() {
    const filler = document.createElement('div');
    filler.style = "position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; color: #ff0000; font-family: monospace; overflow: hidden; pointer-events: none; z-index: 10005; background: rgba(0,0,0,0.9); word-break: break-all; font-size: 11px; line-height: 11px;";
    document.body.appendChild(filler);

    let count = 0;
    const fillInterval = setInterval(() => {
        filler.innerHTML += "BORROWING_DATA_ERROR_0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase() + " ";
        count++;
        if (count > 2500) {
            clearInterval(fillInterval);
            setTimeout(() => location.reload(), 3000);
        }
    }, 20);
}

/* AUTO-START EXACTLY 2 SECONDS AFTER LOAD */
window.addEventListener("load", () => {
    setTimeout(() => {
        startSequence();
    }, 2000); // 2000 ms = 2 seconds
});
</script>
</body>
</html>
