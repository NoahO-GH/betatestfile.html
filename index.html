<!DOCTYPE html>
<html>
<head>
<style>
    body { margin: 0; padding: 0; overflow: hidden; background: black; cursor: none; }
    
    /* Terminal Styles */
    #mainUI { display: flex; flex-direction: column; height: 100vh; font-family: monospace; color: #00ff00; padding: 20px; }
    
    /* BSOD Styles */
    #bsod { display: none; flex-direction: column; background: #0078d7; color: white; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; padding: 10%; justify-content: center; }
    .sad-face { font-size: 100px; margin-bottom: 20px; }
    
    /* Blackout Styles */
    #blackout { display: none; height: 100vh; width: 100vw; background: black; position: fixed; top: 0; left: 0; z-index: 9999; }

    /* Uppercase JK Override Alert */
    #overrideMsg {
        display: none; background: #7a0000; color: white; font-family: 'Courier New', monospace;
        padding: 40px; border: 5px solid red; position: fixed; top: 50%; left: 50%;
        transform: translate(-50%, -50%); z-index: 10000; text-align: center;
        text-transform: uppercase; box-shadow: 0 0 100px red;
    }

    /* Webcam Dot */
    #camDot { display: none; position: fixed; top: 15px; left: 15px; width: 10px; height: 10px; background: red; border-radius: 50%; box-shadow: 0 0 10px red; z-index: 10001; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Screen Shake */
    .glitch-shake { animation: shake 0.2s infinite; }
    @keyframes shake {
        0% { transform: translate(1px, 1px); }
        20% { transform: translate(-3px, 0px); }
        40% { transform: translate(1px, -1px); }
        60% { transform: translate(-1px, 1px); }
        80% { transform: translate(-1px, -1px); }
        100% { transform: translate(1px, -2px); }
    }
</style>
</head>
<body class="glitch-shake">

<div id="mainUI">
    <div id="typewriter"></div>
    <div id="btnBox" style="display:none; gap: 20px; margin-top: 20px;">
        <button onclick="startPrank('yes')" style="background:none; border:1px solid #00ff00; color:#00ff00; padding:10px; cursor:pointer;">[ YES ]</button>
        <button onclick="startPrank('no')" style="background:none; border:1px solid #00ff00; color:#00ff00; padding:10px; cursor:pointer;">[ NO ]</button>
    </div>
</div>

<div id="bsod">
    <div class="sad-face">:(</div>
    <div style="font-size: 24px;">Your PC ran into a problem and needs to restart.</div>
    <div style="font-size: 18px; margin-top: 20px;"><span id="percent">0</span>% complete</div>
</div>

<div id="blackout"></div>

<div id="overrideMsg">
    <p>[!] CRITICAL_SYSTEM_OVERRIDE_INITIATED</p>
    <p>> ERROR_CODE: 0xJK_SYSTEM_BYPASS</p>
    <p>> STATUS: EXECUTING_DATA_HARVEST_ANYWAY...</p>
</div>

<div id="camDot"></div>

<script>
const typewriter = document.getElementById('typewriter');
const btnBox = document.getElementById('btnBox');
const mainUI = document.getElementById('mainUI');
const bsod = document.getElementById('bsod');
const blackout = document.getElementById('blackout');
const percentTxt = document.getElementById('percent');
const overrideMsg = document.getElementById('overrideMsg');

const stealLines = [
    "\n > [SYSTEM]: ACCESSING INTEGRATED WEBCAM... SUCCESS.",
    "\n > [STEALING]: PRIVATE_KEYS.PEM ... 100%",
    "\n > [STEALING]: BROWSER_HISTORY.SQLITE ... 100%",
    "\n > [ALERT]: SECURITY BYPASS DETECTED. INITIALIZING PURGE."
];

function systemBeep() {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.15);
}

function startPrank(choice) {
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    btnBox.style.display = 'none';
    if (choice === 'no') {
        typewriter.innerHTML += "\n\n > ACCESS DENIED. FINE. TERMINATING SESSION...";
        setTimeout(runBsodChain, 1500);
    } else {
        runStealSequence();
    }
}

function runStealSequence() {
    document.getElementById('camDot').style.display = 'block';
    stealLines.forEach((line, i) => {
        setTimeout(() => {
            typewriter.innerHTML += line;
            if (i === stealLines.length - 1) setTimeout(triggerBlackout, 2000);
        }, i * 800);
    });
}

function triggerBlackout() {
    mainUI.style.display = 'none';
    blackout.style.display = 'flex';
    // Instant full blackout, no text as requested
    setTimeout(() => {
        blackout.style.display = 'none';
        bsod.style.display = 'flex';
        runBsodChain();
    }, 3000);
}

function runBsodChain() {
    let p = 0;
    systemBeep();
    let iv = setInterval(() => {
        p += (Math.random() * 0.1);
        if (p >= 99.99) {
            p = 99.99;
            clearInterval(iv);
            setTimeout(() => {
                overrideMsg.style.display = 'block';
                setTimeout(fillScreenWithErrors, 1000);
            }, 1500);
        }
        percentTxt.innerHTML = p.toFixed(2);
    }, 50);
}

function fillScreenWithErrors() {
    const filler = document.createElement('div');
    filler.style = "position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; color: #ff0000; font-family: monospace; overflow: hidden; pointer-events: none; z-index: 9998; background: rgba(0,0,0,0.9); word-break: break-all; font-size: 10px;";
    document.body.appendChild(filler);

    let count = 0;
    const fillInterval = setInterval(() => {
        filler.innerHTML += "SYSTEM_OVERRIDE_ERROR_0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase() + " ";
        count++;
        if (count > 1500) {
            clearInterval(fillInterval);
            setTimeout(() => location.reload(), 3000); // Reset after prank
        }
    }, 5);
}

window.onload = () => {
    typewriter.innerHTML = "init_data_harvest.exe --target=C:/Users/%USERNAME% --force\n\n > INITIALIZING DATA_EXTRACTION_PROTOCOL...\n > DO YOU CONSENT?";
    btnBox.style.display = 'flex';
};
</script>
</body>
</html>
