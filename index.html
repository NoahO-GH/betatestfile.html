<!DOCTYPE html>
<html>
<head>
<style>
    body { background: black; color: #dfdfdf; font-family: 'Consolas', 'Courier New', monospace; margin: 0; padding: 25px; font-size: 20px; line-height: 1.5; overflow: hidden; text-transform: uppercase; }
    #terminal { white-space: pre-wrap; display: inline; }
    .cursor { display: inline-block; width: 12px; height: 24px; background: #dfdfdf; margin-left: 5px; animation: blink 1s infinite; vertical-align: middle; }
    @keyframes blink { 50% { opacity: 0; } }
    .btn-box { display: flex; gap: 30px; margin-top: 30px; }
    button { background: black; border: 1px solid #dfdfdf; color: #dfdfdf; padding: 12px 24px; font-family: inherit; cursor: pointer; font-size: 18px; text-transform: uppercase; }
    button:hover { background: #dfdfdf; color: black; }
    #bsod { display: none; background: #0078d7; color: white; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; padding: 10%; font-family: 'Segoe UI', sans-serif; z-index: 10000; }
    #rebootMsg { display: none; background: #7a0000; color: white; font-family: 'Courier New', monospace; padding: 40px; border: 5px solid red; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10001; text-align: center; box-shadow: 0 0 100px red; }
    #camDot { display: none; position: fixed; top: 15px; left: 15px; width: 12px; height: 12px; background: red; border-radius: 50%; box-shadow: 0 0 15px red; z-index: 10002; animation: blink 0.8s infinite; }
</style>
</head>
<body>

<div id="camDot"></div>
<div id="terminal"></div><span class="cursor" id="cursor"></span>

<div class="btn-box" id="btnBox" style="display:none;">
    <button onclick="handleChoice('yes')">[ YES ]</button>
    <button onclick="handleChoice('no')">[ NO ]</button>
</div>

<div id="bsod">
    <div style="font-size: 120px;">:(</div>
    <p style="font-size: 36px;">YOUR PC RAN INTO A PROBLEM AND NEEDS TO RESTART.</p>
    <p style="font-size: 24px;"><span id="percent">0</span>% COMPLETE</p>
</div>

<div id="rebootMsg">
    <p>[!] SYSTEM_CRITICAL_FAILURE</p>
    <p>> ERROR_CODE: 0xREBOOT_BYPASS_INITIATED</p>
    <p>> STATUS: REBOOTING_SYSTEM_NOW...</p>
</div>

<script>
const output = document.getElementById('terminal');
const btnBox = document.getElementById('btnBox');
const bsod = document.getElementById('bsod');
const percentTxt = document.getElementById('percent');
const rebootMsg = document.getElementById('rebootMsg');
const camDot = document.getElementById('camDot');

function beep(freq = 800, duration = 0.1) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
}

function multiBeep() {
    beep(800, 0.1);
    setTimeout(() => beep(900, 0.1), 150);
    setTimeout(() => beep(1000, 0.1), 300);
}

async function typeWriter(text, speed = 20) {
    for (let i = 0; i < text.length; i++) {
        output.innerHTML += text.charAt(i).toUpperCase();
        window.scrollTo(0, document.body.scrollHeight);
        await new Promise(res => setTimeout(res, speed));
    }
}

async function startSequence() {
    await typeWriter("MICROSOFT WINDOWS [VERSION 10.0.22631.3447]\n(C) MICROSOFT CORPORATION. ALL RIGHTS RESERVED.\n\n");
    await typeWriter("C:\\USERS\\ADMIN> INIT_DATA_HARVEST.EXE --TARGET=SYSTEM_ROOT --FORCE\n");
    await typeWriter("> DETECTING NETWORK INTERFACE... SUCCESS.\n");
    await typeWriter(`> REMOTE_IP_LOGGED: ${Math.floor(Math.random()*255)}.168.1.${Math.floor(Math.random()*255)}\n`);
    await typeWriter("> BYPASSING WINDOWS DEFENDER... [||||||||||] 100%\n");
    await typeWriter("> FIREWALL STATUS: DISABLED.\n");
    await typeWriter("> DO YOU CONSENT TO DATA EXTRACTION? (Y/N): ");
    btnBox.style.display = 'flex';
}

async function handleChoice(choice) {
    multiBeep();
    btnBox.style.display = 'none';
    output.innerHTML += choice.toUpperCase() + "\n";
    
    if (choice === 'yes') {
        await typeWriter("> THANK YOU FOR YOUR COOPERATION.\n");
        await typeWriter("> DATA BEING \"BORROWED\" IN PROGRESS...\n");
        await typeWriter("> SCANNING DIRECTORY: C:/USERS/DOCUMENTS/PRIVATE/\n", 30);
        await typeWriter("> [STEALING]: BANK_INFO_EXPORT.XLSX ... DONE\n", 10);
        await typeWriter("> [STEALING]: SAVED_PASSWORDS_BROWSER ... DONE\n", 10);
        await typeWriter("> [SYSTEM]: ACCESSING INTEGRATED WEBCAM... SUCCESS.\n");
        camDot.style.display = 'block'; // Show recording dot
        await typeWriter("> RECORDING SESSION START... UPLOADING TO REMOTE CLOUD...\n");
        await typeWriter("> ALL DATA SUCCESSFULLY RELOCATED. BYE.\n");
        setTimeout(fillScreenWithErrors, 1500);
    } else {
        await typeWriter("> ACCESS DENIED BY USER.\n", 5);
        await typeWriter("> FINE.\n", 5);
        await typeWriter("> BYPASSING PERMISSIONS... OVERRIDE SUCCESSFUL.\n", 5);
        await typeWriter("> TERMINATING SESSION TO PREVENT LOGGING...\n", 5);
        await typeWriter("> CRITICAL_KERNEL_ERROR_DETONATED.", 5);
        setTimeout(triggerBSOD, 800);
    }
}

function triggerBSOD() {
    bsod.style.display = 'block';
    if (document.documentElement.requestFullscreen) document.documentElement.requestFullscreen();
    let p = 0;
    let iv = setInterval(() => {
        p += Math.random() * 12; // Very fast BSOD load
        if (p >= 99.99) {
            p = 99.99;
            clearInterval(iv);
            setTimeout(() => {
                rebootMsg.style.display = 'block';
                setTimeout(() => location.reload(), 4000);
            }, 1000);
        }
        percentTxt.innerText = p.toFixed(2);
    }, 80);
}

function fillScreenWithErrors() {
    const filler = document.createElement('div');
    filler.style = "position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; color: #ff0000; font-family: monospace; overflow: hidden; pointer-events: none; z-index: 10005; background: rgba(0,0,0,0.9); word-break: break-all; font-size: 11px; line-height: 11px;";
    document.body.appendChild(filler);

    let count = 0;
    const fillInterval = setInterval(() => {
        filler.innerHTML += "BORROWING_DATA_ERROR_0x" + Math.floor(Math.random()*16777215).toString(16).toUpperCase() + " ";
        count++;
        if (count > 2500) {
            clearInterval(fillInterval);
            setTimeout(() => location.reload(), 3000);
        }
    }, 4);
}

startSequence();
</script>
</body>
</html>
