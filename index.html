<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TERMINAL_ACCESS</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: black; 
            font-family: 'Courier New', Courier, monospace;
            cursor: none; 
        }
        #main-ui, .screen { 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; text-align: left; color: #00ff00; 
            padding: 40px;
        }
        .code-text { 
            font-size: 1.5rem; 
            line-height: 1.6;
            margin-bottom: 30px;
            max-width: 800px;
        }
        .btn-container { display: flex; gap: 40px; }
        button { 
            background: #003300; color: #00ff00; border: 1px solid #00ff00; 
            padding: 15px 30px; font-size: 1.2rem; cursor: pointer; 
            font-family: inherit; text-transform: uppercase;
        }
        button:hover { background: #00ff00; color: black; }
        #bsod { 
            background: #0078d7; color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: none; padding: 50px; 
            text-align: left; align-items: flex-start; 
        }
        #blackout { background: black; display: none; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="code-text">
        > INITIALIZING DATA_EXTRACTION_PROTOCOL...<br>
        > TARGET_ROOT_DIRECTORY: C:/USER/ACCOUNT_INFO<br>
        > DO YOU CONSENT TO DATA TRANSFER? [Y/N]
    </div>
    <div class="btn-container">
        <button onclick="startPrank('yes')">[ YES ]</button>
        <button onclick="startPrank('no')">[ NO ]</button>
    </div>
</div>

<div id="bsod" class="screen">
    <div style="font-size: 10rem;">:(</div>
    <div style="font-size: 2rem; margin: 20px 0;">Your PC ran into a problem and needs to restart.</div>
    <div id="bsod-msg" style="font-size: 1.5rem; margin-top: 50px; display:none;">FORCED OVERRIDE: ACQUIRING DATA ANYWAY...</div>
</div>

<div id="blackout" class="screen"></div>

<script>
    const mainUI = document.getElementById('main-ui');
    const bsod = document.getElementById('bsod');
    const bsodMsg = document.getElementById('bsod-msg');
    const blackout = document.getElementById('blackout');
    let prankActive = false;

    function forceFull() {
        let elem = document.documentElement;
        if (elem.requestFullscreen) {
            elem.requestFullscreen().catch(() => {});
        } else if (elem.webkitRequestFullscreen) {
            elem.webkitRequestFullscreen().catch(() => {});
        }
    }

    // Aggressive instant-fullscreen trigger on any click
    document.addEventListener('mousedown', () => {
        if (prankActive) forceFull();
    });

    // Jump-back loop
    setInterval(() => {
        if (prankActive && !document.fullscreenElement) {
            forceFull();
        }
    }, 100);

    function startPrank(choice) {
        prankActive = true;
        forceFull();
        
        if (choice === 'yes') {
            mainUI.innerHTML = `<div class="code-text" style="color:#00ff00;">> ACCESS GRANTED.<br>> THANK YOU.</div>`;
            setTimeout(() => {
                mainUI.style.display = 'none';
                blackout.style.display = 'flex';
            }, 2000);
        } else {
            mainUI.style.display = 'none';
            bsod.style.display = 'flex';
            setTimeout(() => {
                bsodMsg.style.display = 'block';
                setTimeout(() => {
                    bsod.style.display = 'none';
                    blackout.style.display = 'flex';
                }, 3000);
            }, 10000);
        }
    }
</script>
</body>
</html>
