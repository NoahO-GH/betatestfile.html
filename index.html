<!DOCTYPE html>
<html>
<head>
<style>
    body {
        background: black;
        color: #00ff00; /* GREEN TERMINAL TEXT */
        font-family: 'Consolas', 'Courier New', monospace;
        margin: 0;
        padding: 25px;
        font-size: 20px;
        line-height: 1.5;
        overflow: hidden;
        text-transform: uppercase;
    }
    #terminal { white-space: pre-wrap; display: inline; }
    .cursor {
        display: inline-block;
        width: 12px;
        height: 24px;
        background: #00ff00;
        margin-left: 5px;
        animation: blink 1s infinite;
        vertical-align: middle;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .btn-box {
        display: flex;
        gap: 30px;
        margin-top: 30px;
    }
    button {
        background: black;
        border: 1px solid #00ff00;
        color: #00ff00;
        padding: 12px 24px;
        font-family: inherit;
        cursor: pointer;
        font-size: 18px;
        text-transform: uppercase;
    }
    button:hover { background: #00ff00; color: black; }

    #bsod {
        display: none;
        background: #0078d7;
        color: white;
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        padding: 10%;
        font-family: 'Segoe UI', sans-serif;
        z-index: 10000;
    }
    #rebootMsg {
        display: none;
        background: #7a0000;
        color: white;
        font-family: 'Courier New', monospace;
        padding: 40px;
        border: 5px solid red;
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10001;
        text-align: center;
        box-shadow: 0 0 100px red;
    }
    #camDot {
        display: none;
        position: fixed;
        top: 15px;
        left: 15px;
        width: 12px;
        height: 12px;
        background: red;
        border-radius: 50%;
        box-shadow: 0 0 15px red;
        z-index: 10002;
        animation: blink 0.8s infinite;
    }

    /* FULL GLITCH EFFECTS */
    .glitch-strong {
        filter: contrast(1.7) saturate(1.5) hue-rotate(-5deg);
        transform: translateX(-3px) skewX(1deg);
    }
    .glitch-offset {
        text-shadow:
            -2px 0 rgba(0,255,0,0.7),
            2px 0 rgba(0,180,0,0.7);
    }
    .glitch-jitter {
        transform: translateX(-2px) translateY(1px);
    }
    .glitch-tear {
        position: relative;
    }
    .glitch-tear::after {
        content: attr(data-glitch);
        position: absolute;
        left: -2px;
        top: 1px;
        width: 100%;
        color: #00ff00;
        clip-path: polygon(0 0, 100% 0, 100% 40%, 0 60%);
        transform: translateX(3px);
        opacity: 0.7;
        mix-blend-mode: screen;
    }
    .scanline-overlay::before {
        content: "";
        pointer-events: none;
        position: fixed;
        left: 0;
        top: 0;
        width: 100vw;
        height: 100vh;
        background: repeating-linear-gradient(
            to bottom,
            rgba(0,255,0,0.03) 0px,
            rgba(0,255,0,0.03) 1px,
            transparent 2px,
            transparent 3px
        );
        mix-blend-mode: screen;
        z-index: 9999;
    }
    .flash {
        animation: flashScreen 0.12s linear;
    }
    @keyframes flashScreen {
        0% { background-color: #00ff00; }
        100% { background-color: #000000; }
    }
</style>
</head>

function beep(freq = 800, duration = 0.1) {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + duration);
}

function multiBeep() {
    beep(800, 0.1);
    setTimeout(() => beep(900, 0.1), 150);
    setTimeout(() => beep(1000, 0.1), 300);
}

function sleep(ms) {
    return new Promise(res => setTimeout(res, ms));
}

async function typeWriter(text, speed = 45) {
    for (let i = 0; i < text.length; i++) {
        output.innerHTML += text.charAt(i).toUpperCase();
        window.scrollTo(0, document.body.scrollHeight);
        await sleep(speed);
    }
}

/* FULL GLITCH SYSTEM */
function doGlitchOnce() {
    const body = document.body;

    const useJitter = Math.random() < 0.6;
    const useScanline = Math.random() < 0.5;
    const useTear = Math.random() < 0.5;
    const useFlash = Math.random() < 0.25;

    if (useStrong) body.classList.add('glitch-strong');
    if (useOffset) terminal.classList.add('glitch-offset');
    if (useJitter) terminal.classList.add('glitch-jitter');
    if (useScanline) body.classList.add('scanline-overlay');

    if (useTear) {
        terminal.classList.add('glitch-tear');
        terminal.setAttribute('data-glitch', terminal.innerText.slice(-200) || terminal.innerText);
    }

    if (useFlash) {
        body.classList.add('flash');
    }

    setTimeout(() => {
        body.classList.remove('glitch-strong', 'scanline-overlay', 'flash');
        terminal.classList.remove('glitch-offset', 'glitch-jitter', 'glitch-tear');
    }, 120 + Math.random() * 260);
}

function startGlitchLoop() {
    const loop = () => {
        if (Math.random() < 0.8) {
            doGlitchOnce();
        }
        const next = 400 + Math.random() * 1600;
        setTimeout(loop, next);
    };
    loop();
}
