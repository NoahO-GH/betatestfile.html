<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRITICAL SYSTEM ERROR</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            overflow: hidden; background: black; 
            font-family: 'Courier New', Courier, monospace;
            cursor: none; /* Hides the mouse to make exiting harder */
        }
        #main-ui, .screen { 
            display: flex; flex-direction: column; 
            justify-content: center; align-items: center; 
            height: 100vh; text-align: center; color: #00ff00; 
        }
        .glitch { 
            font-size: 2.5rem; color: #ff0000; 
            text-shadow: 2px 2px #550000; 
            animation: glitch-anim 0.1s infinite; 
            margin-bottom: 30px; padding: 20px;
        }
        @keyframes glitch-anim { 
            0% { transform: translate(0); } 
            20% { transform: translate(-5px, 5px); } 
            80% { transform: translate(5px, -5px); } 
            100% { transform: translate(0); } 
        }
        .btn-container { display: flex; gap: 40px; }
        button { 
            background: black; color: #ff0000; border: 2px solid #ff0000; 
            padding: 20px 40px; font-size: 1.8rem; cursor: none; 
            font-family: inherit; 
        }
        #bsod { 
            background: #0078d7; color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: none; padding: 50px; 
            text-align: left; align-items: flex-start; 
        }
        #blackout { background: black; display: none; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="glitch">DO YOU CONSENT TO YOUR ACCOUNT INFO TO BE "BORROWED"?</div>
    <div class="btn-container">
        <button onclick="startPrank('yes')">YES</button>
        <button onclick="startPrank('no')">NO</button>
    </div>
</div>

<div id="bsod" class="screen">
    <div style="font-size: 10rem;">:(</div>
    <div style="font-size: 2rem; margin: 20px 0;">Your PC ran into a problem and needs to restart. We're just collecting some error info...</div>
    <div id="bsod-msg" style="font-size: 1.5rem; margin-top: 50px; display:none;">WE WILL TAKE IT ANYWAY....</div>
</div>

<div id="blackout" class="screen"></div>

<script>
    const mainUI = document.getElementById('main-ui');
    const bsod = document.getElementById('bsod');
    const bsodMsg = document.getElementById('bsod-msg');
    const blackout = document.getElementById('blackout');
    let prankActive = false;

    function forceFull() {
        if (!document.fullscreenElement) {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen().catch(()=>{});
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen().catch(()=>{});
        }
    }

    // THIS IS THE JUMP-BACK LOOP
    // It checks every 500ms. If they try to move or click, it forces them back.
    setInterval(() => {
        if (prankActive && !document.fullscreenElement) {
            // We need a "listener" for the next move to trigger it
            window.addEventListener('mousemove', forceFull, { once: true });
            window.addEventListener('click', forceFull, { once: true });
        }
    }, 500);

    function startPrank(choice) {
        prankActive = true;
        forceFull();
        
        if (choice === 'yes') {
            mainUI.innerHTML = `<div class="glitch" style="color:red; font-size: 5rem;">THANK YOU</div>`;
            setTimeout(() => {
                mainUI.style.display = 'none';
                blackout.style.display = 'flex';
            }, 2000);
        } else {
            mainUI.style.display = 'none';
            bsod.style.display = 'flex';
            setTimeout(() => {
                bsodMsg.style.display = 'block';
                setTimeout(() => {
                    bsod.style.display = 'none';
                    blackout.style.display = 'flex';
                }, 3000);
            }, 10000);
        }
    }
</script>
</body>
</html>
